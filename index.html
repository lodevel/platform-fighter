<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a12" />
    <title>Platform Fighter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a12;
        color: #e8e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #game-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a12;
      }
      #game-root canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      #boot-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a12;
        z-index: 10;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      #boot-overlay.hidden {
        opacity: 0;
      }
      #boot-overlay span {
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <div id="boot-overlay"><span>Loading…</span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
