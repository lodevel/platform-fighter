goal: 'Three-track phased enhancement (T2→T1→T3) to an existing Phaser/Matter platform
  fighter: (1) architectural refactor extracting attack implementations and movement
  profiles from shared Character base into per-fighter classes with a uniform 10-slot
  contract, (2) fix special-attack input wiring bug and ship one shared default neutralSpecial
  with sprite animation for all 4 fighters, (3) build a Smash-style items/weapons
  framework with spawn manager, pickup/drop/throw mechanics, replay-RNG seeding, 3
  reference items (bat, ray gun, bomb), and item-aware AI bots'
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  # First-primary entry MUST be an absolute directory path. The CLI's
  # `_resolve_cli_project_dir` calls `project_path_candidates_from_seed`
  # which picks the first `role: primary` entry as the project root,
  # then the orchestrator adapter chdirs there. A file path here will
  # crash every spawned agent with "Working directory does not exist".
  # See ouroboros/core/project_paths.py:project_path_candidates_from_seed.
  - path: /mnt/c/Workspace/test_claude
    role: primary
    summary: Project root — Phaser/Matter platform fighter monorepo
  - path: src/characters/Character.ts
    role: primary
    summary: Shared Character base class owning physics body, sprite/render pipeline,
      input dispatch, damage/knockback state machine, respawn logic, percentage tracking
      — attack code to be extracted
  - path: Wolf.ts
    role: primary
    summary: Wolf fighter file already has 4 directional specials defined — must retain
      them and gain full 10-slot ownership after refactor
  - path: Cat.ts
    role: primary
    summary: Cat fighter file — currently inherits from Character base, must own full
      moveset and movement profile after refactor, gains dash/teleport subsystem hook
  - path: Owl.ts
    role: primary
    summary: Owl fighter file — currently inherits from Character base, must own full
      moveset and movement profile after refactor, gains projectile pool subsystem
      hook
  - path: Bear.ts
    role: primary
    summary: Bear fighter file — currently inherits from Character base, must own
      full moveset and movement profile after refactor, gains grab state subsystem
      hook
  - path: InputResolver
    role: primary
    summary: Input resolution module where the G-binding bug exists — input not reaching
